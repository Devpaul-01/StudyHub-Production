<!-- ── Learnora-scoped styles ─────────────────────────────────────────── -->
<style>
/* === Layout === */
#learnora.section { display: none; }

/*
 * Fix 1, 4, 5: Absolute-fill the section so it occupies exactly the
 * available viewport area set by the parent shell. This guarantees:
 *   – No extra borders / margins bleeding outside
 *   – The flex column has a bounded height, so flex-shrink:0 on the
 *     header and input area actually works (they stay fixed)
 *   – The messages area (flex:1 + overflow-y:auto) is the only thing
 *     that scrolls
 */
#learnora.section.active {
  display: flex;
  flex-direction: column;
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.lr-root {
  display: flex;
  flex: 1;
  overflow: hidden;
  background: #f9fafb;
  position: relative;
  min-height: 0; /* required so flex children can shrink below content size */
}

/* === Sidebar === */
.lr-sidebar {
  width: 260px;
  min-width: 260px;
  background: #ffffff;
  border-right: none;
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease, min-width 0.25s ease, opacity 0.25s ease;
  overflow: hidden;
  z-index: 20;
  box-shadow: 1px 0 0 #f3f4f6;
}

.lr-sidebar--closed {
  width: 0 !important;
  min-width: 0 !important;
  opacity: 0;
  pointer-events: none;
}

.lr-sidebar-header {
  padding: 16px 12px 12px;
  border-bottom: 1px solid #f3f4f6;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lr-sidebar-title {
  font-size: 15px;
  font-weight: 700;
  color: #111827;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.lr-new-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.35);
  transition: opacity 0.15s, transform 0.15s;
}
.lr-new-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.lr-new-btn:active { transform: scale(0.97); }

/* Sidebar close button (always visible inside sidebar header) */
.lr-sidebar-close {
  background: none;
  border: none;
  color: #9ca3af;
  cursor: pointer;
  padding: 5px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
  flex-shrink: 0;
}
.lr-sidebar-close:hover { background: #f3f4f6; color: #374151; }

/* Conv list */
.lr-conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 6px;
}
.lr-conv-list::-webkit-scrollbar { width: 4px; }
.lr-conv-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }

.lr-conv-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.12s;
  margin-bottom: 2px;
}
.lr-conv-item:hover { background: #f3f4f6; }
.lr-conv-item--active {
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(236,72,153,0.06));
  border-left: 2px solid #7c3aed;
}
.lr-conv-item__body { flex: 1; min-width: 0; }
.lr-conv-item__title {
  font-size: 13px;
  font-weight: 500;
  color: #111827;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lr-conv-item--active .lr-conv-item__title { color: #7c3aed; font-weight: 600; }
.lr-conv-item__meta {
  display: flex;
  gap: 6px;
  font-size: 11px;
  color: #9ca3af;
  margin-top: 2px;
}

/* Options (⋯) button on conv item */
.lr-conv-item__opts {
  opacity: 0;
  background: none;
  border: none;
  color: #9ca3af;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 5px;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
  flex-shrink: 0;
  font-size: 16px;
  line-height: 1;
  letter-spacing: 1px;
}
.lr-conv-item:hover .lr-conv-item__opts,
.lr-conv-item__opts:focus { opacity: 1; }
.lr-conv-item__opts:hover { color: #374151; background: #e5e7eb; }

/* Floating context menu */
.lr-conv-menu {
  position: fixed;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
  z-index: 9999;
  min-width: 168px;
  padding: 4px;
  animation: lr-menu-in 0.12s ease;
}
@keyframes lr-menu-in {
  from { opacity: 0; transform: scale(0.96) translateY(-4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.lr-conv-menu__item {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  padding: 8px 12px;
  border: none;
  background: none;
  border-radius: 7px;
  font-size: 13px;
  color: #374151;
  cursor: pointer;
  text-align: left;
  transition: background 0.1s, color 0.1s;
}
.lr-conv-menu__item:hover { background: #f3f4f6; color: #111827; }
.lr-conv-menu__item--danger { color: #dc2626; }
.lr-conv-menu__item--danger:hover { background: #fee2e2; color: #b91c1c; }
.lr-conv-menu__divider {
  height: 1px;
  background: #f3f4f6;
  margin: 3px 4px;
}

/* Skeleton */
.lr-conv-skeleton { padding: 10px; margin-bottom: 4px; }
.lr-skel {
  border-radius: 4px;
  background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
  background-size: 200% 100%;
  animation: lr-shimmer 1.4s ease infinite;
}
.lr-skel--title { height: 13px; width: 75%; margin-bottom: 6px; }
.lr-skel--meta  { height: 11px; width: 50%; }
@keyframes lr-shimmer { to { background-position: -200% 0; } }

.lr-sidebar-empty, .lr-sidebar-error {
  text-align: center;
  padding: 32px 16px;
  color: #9ca3af;
  font-size: 13px;
}
.lr-sidebar-empty svg { margin: 0 auto 8px; display: block; }
.lr-sidebar-empty p { font-weight: 500; color: #6b7280; margin-bottom: 4px; }
.lr-sidebar-empty span { font-size: 12px; }

/* Mobile overlay */
.lr-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 19;
}
.lr-overlay.visible { display: block; }

/* === Main chat area === */
.lr-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  min-height: 0; /* prevents flex blowout */
}

/* Chat header — fixed, never scrolls */
.lr-chat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: #ffffff;
  border-bottom: 1px solid #f3f4f6;
  min-height: 56px;
  flex-shrink: 0; /* key: never allow this to scroll away */
  position: relative;
  z-index: 2;
}

.lr-toggle-btn {
  background: none;
  border: none;
  color: #6b7280;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.lr-toggle-btn:hover { background: #f3f4f6; color: #111827; }

.lr-chat-title {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: #111827;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: text;
  border-radius: 4px;
  padding: 2px 4px;
}
.lr-chat-title:hover { background: #f9fafb; }
.lr-title--editing {
  outline: 2px solid #7c3aed;
  background: #fff !important;
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
}

.lr-header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.lr-mode-select {
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  background: #f9fafb;
  color: #374151;
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}
.lr-mode-select:focus { border-color: #7c3aed; }

/* === Messages === */
.lr-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.lr-messages::-webkit-scrollbar { width: 5px; }
.lr-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }

/* Messages loading */
.lr-messages-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}
.lr-spinner {
  width: 28px; height: 28px;
  border: 3px solid #e5e7eb;
  border-top-color: #7c3aed;
  border-radius: 50%;
  animation: lr-spin 0.7s linear infinite;
}
@keyframes lr-spin { to { transform: rotate(360deg); } }

/* Empty / welcome states */
.lr-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  height: 100%;
  min-height: 300px;
  padding: 32px 24px;
  gap: 12px;
  color: #6b7280;
}
.lr-empty-state__icon {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(236,72,153,0.06));
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
}
.lr-empty-state h3 { font-size: 18px; font-weight: 700; color: #111827; margin: 0; }
.lr-empty-state p  { font-size: 14px; max-width: 320px; margin: 0; line-height: 1.6; }

.lr-suggestions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 380px;
  margin-top: 8px;
}
.lr-suggestion {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  background: #ffffff;
  color: #374151;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
}
.lr-suggestion:hover {
  border-color: #7c3aed;
  background: #faf5ff;
  box-shadow: 0 2px 8px rgba(124,58,237,0.12);
}

/* Error state */
.lr-error-state {
  text-align: center;
  padding: 40px 20px;
  color: #6b7280;
  font-size: 14px;
  line-height: 1.8;
}
.lr-link {
  background: none;
  border: none;
  color: #7c3aed;
  cursor: pointer;
  font-size: inherit;
  font-weight: 500;
  text-decoration: underline;
  padding: 0;
}

/* === Message bubbles === */
.lr-msg {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  max-width: 100%;
}

/* AI message — left, minimal */
.lr-msg--ai {
  flex-direction: row;
}
.lr-msg__avatar {
  width: 30px; height: 30px;
  border-radius: 10px;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  box-shadow: 0 2px 8px rgba(124,58,237,0.3);
}
.lr-msg__body {
  font-size: 14px;
  line-height: 1.7;
  color: #1f2937;
  max-width: min(680px, 100%);
  flex: 1;
  min-width: 0;
}

/* Streaming cursor */
.lr-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: #7c3aed;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: lr-blink 0.8s step-end infinite;
  border-radius: 1px;
}
@keyframes lr-blink { 50% { opacity: 0; } }

/* User message — right, styled bubble (spec: only user wrapped in styled div) */
.lr-msg--user {
  flex-direction: row-reverse;
}
.lr-msg__bubble {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 11px 15px;
  border-radius: 18px 18px 4px 18px;
  background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
  color: #ffffff;
  font-size: 14px;
  line-height: 1.6;
  max-width: min(580px, 85%);
  box-shadow: 0 3px 12px rgba(124,58,237,0.3);
  word-break: break-word;
}

/* File chips inside user bubble */
.lr-msg-attachments { display: flex; flex-wrap: wrap; gap: 4px; }
.lr-attach-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  font-size: 11px;
  font-weight: 500;
}

/* Typing indicator */
.lr-msg--typing .lr-typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 10px 4px;
}
.lr-typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #9ca3af;
  animation: lr-bounce 1.2s ease-in-out infinite;
}
.lr-typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.lr-typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes lr-bounce {
  0%, 60%, 100% { transform: translateY(0); background: #c4b5fd; }
  30%            { transform: translateY(-6px); background: #7c3aed; }
}

/* Continue banner */
.lr-continue-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 12px;
  background: #fef3c7;
  border: 1px solid #fde68a;
  color: #92400e;
  font-size: 13px;
  margin-top: 4px;
}
.lr-continue-btn {
  background: none;
  border: none;
  color: #7c3aed;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-left: auto;
  padding: 0;
}
.lr-continue-btn:hover { text-decoration: underline; }

/* === Markdown output styles === */
.lr-msg__body .lr-p   { margin: 0 0 8px; }
.lr-msg__body .lr-p:last-child { margin-bottom: 0; }
.lr-msg__body .lr-h   { font-weight: 600; color: #111827; margin: 14px 0 6px; }
.lr-msg__body .lr-h1  { font-size: 16px; }
.lr-msg__body .lr-h2  { font-size: 15px; }
.lr-msg__body .lr-ul, .lr-msg__body .lr-ol { margin: 6px 0 8px 16px; display: flex; flex-direction: column; gap: 3px; }
.lr-msg__body .lr-li  { font-size: 14px; line-height: 1.6; }
.lr-msg__body .lr-li  { list-style: disc; }
.lr-msg__body .lr-li-ol { list-style: decimal; }
.lr-msg__body .lr-bq  { border-left: 3px solid #c4b5fd; padding: 4px 12px; color: #6b7280; margin: 8px 0; background: #faf5ff; border-radius: 0 6px 6px 0; }
.lr-msg__body .lr-hr  { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }

.lr-inline-code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 12.5px;
  padding: 1px 6px;
  background: #f3f4f6;
  border-radius: 4px;
  color: #6d28d9;
  border: 1px solid #e5e7eb;
}

.lr-code-block {
  position: relative;
  border-radius: 10px;
  background: #1e1b2e;
  margin: 10px 0;
  overflow: hidden;
}
.lr-code-lang {
  display: block;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  color: #a78bfa;
  background: #16132a;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.lr-code-block pre {
  margin: 0;
  padding: 14px 16px;
  overflow-x: auto;
}
.lr-code-block code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: #e2d9f3;
}

/* === Input area — fixed at bottom, never scrolls === */
.lr-input-area {
  background: #ffffff;
  border-top: 1px solid #f3f4f6;
  padding: 12px 16px 16px;
  flex-shrink: 0; /* key: never scrolls away */
  position: relative;
  z-index: 2;
}

/* File preview chips */
.lr-file-previews {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.lr-file-previews.hidden { display: none; }
.lr-file-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px 4px 10px;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  font-size: 12px;
  color: #374151;
}
.lr-file-chip__remove {
  background: none;
  border: none;
  color: #9ca3af;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.1s;
}
.lr-file-chip__remove:hover { color: #ef4444; }

/* Controls row */
.lr-controls-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

/* Input row */
.lr-input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: #f3f4f6;
  border: 1.5px solid #e5e7eb;
  border-radius: 16px;
  padding: 6px 8px 6px 12px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.lr-input-row:focus-within {
  border-color: #7c3aed;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
  background: #ffffff;
}

.lr-attach-btn {
  background: none;
  border: none;
  color: #9ca3af;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color 0.12s, background 0.12s;
  align-self: flex-end;
  margin-bottom: 2px;
}
.lr-attach-btn:hover { color: #7c3aed; background: #f5f3ff; }

.lr-textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  resize: none;
  font-size: 14px;
  line-height: 1.5;
  color: #111827;
  max-height: 200px;
  overflow-y: auto;
  padding: 4px 0;
  font-family: inherit;
}
.lr-textarea::placeholder { color: #9ca3af; }

.lr-send-btn {
  width: 36px; height: 36px;
  border-radius: 11px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899);
  color: #ffffff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 8px rgba(124,58,237,0.35);
  align-self: flex-end;
}
.lr-send-btn:hover:not(:disabled)  { opacity: 0.9; transform: scale(1.05); box-shadow: 0 4px 14px rgba(124,58,237,0.4); }
.lr-send-btn:active:not(:disabled) { transform: scale(0.96); }
.lr-send-btn--disabled,
.lr-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Quota pill */
.lr-quota {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #9ca3af;
  margin-top: 8px;
}
.lr-quota__bar { width: 60px; height: 3px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
.lr-quota__fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #ec4899); border-radius: 999px; transition: width 0.3s; }
.lr-quota--low .lr-quota__fill    { background: #f59e0b; }
.lr-quota--urgent .lr-quota__fill { background: #ef4444; }
.lr-quota--urgent { color: #ef4444; }

/* Stream error */
.lr-stream-error { color: #ef4444; font-size: 13px; }

/* Mobile responsive */
@media (max-width: 767px) {
  .lr-sidebar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    z-index: 30;
    box-shadow: 4px 0 24px rgba(0,0,0,0.12);
  }
  .lr-sidebar--closed { width: 0 !important; min-width: 0 !important; }
  .lr-overlay { display: none; }
  .lr-overlay.visible { display: block; }
  .lr-msg__bubble { max-width: 90%; }
}
</style>

    <div id="lr-overlay" class="lr-overlay" data-action="learnora-close-sidebar"></div>

    <aside id="lr-sidebar" class="lr-sidebar">
      <div class="lr-sidebar-header">

        <button class="lr-new-btn" data-action="learnora-new-chat" title="New conversation" aria-label="New conversation">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New
        </button>
        <!-- Fix 2: Close button lives inside the sidebar so it's always accessible even when sidebar overlays the header on mobile -->
        <button class="lr-sidebar-close"
                data-action="learnora-toggle-sidebar"
                title="Close sidebar"
                aria-label="Close sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div id="lr-conv-list" class="lr-conv-list" role="list" aria-label="Conversations">
        <!-- Populated by learnora.events.js -->
      </div>
    </aside>

    <!-- ── Main chat area ──────────────────────────────────────────────── -->
    <div class="lr-main">

      <!-- Chat header -->
      <header class="lr-chat-header">
        <button class="lr-toggle-btn"
                data-action="learnora-toggle-sidebar"
                title="Toggle sidebar"
                aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <h2 id="lr-chat-title"
            class="lr-chat-title"
            data-action="learnora-edit-title"
            title="Double-click to rename"
            role="heading"
            aria-level="2">
          Learnora AI
        </h2>

        <div class="lr-header-actions">
          <select id="lr-mode-select"
                  class="lr-mode-select"
                  data-action="learnora-change-mode"
                  title="Response mode"
                  aria-label="Response mode">
            <option value="fast_response">⚡ Fast</option>
            <option value="deep_think">🧠 Deep Think</option>
            <option value="programming">💻 Code</option>
            <option value="research">🔬 Research</option>
            <option value="summarize">📋 Summarize</option>
            <option value="explain">🎓 Explain</option>
          </select>
        </div>
      </header>

      <!-- Messages -->
      <div id="lr-messages"
           class="lr-messages"
           role="log"
           aria-live="polite"
           aria-label="Chat messages">
        <!-- Populated dynamically -->
      </div>

      <!-- Input area -->
      <div class="lr-input-area">

        <!-- Attached file previews -->
        <div id="lr-file-previews" class="lr-file-previews hidden" aria-label="Attached files">
          <!-- Chips populated by learnora.events.js -->
        </div>

        <!-- Input row (attach + textarea + send) -->
        <div class="lr-input-row">
          <input type="file"
                 id="lr-file-input"
                 multiple
                 accept=".jpg,.jpeg,.png,.webp,.gif,.pdf,.txt,.csv,.doc,.docx,.py,.js,.ts,.html,.css"
                 class="hidden"
                 aria-hidden="true">

          <button class="lr-attach-btn"
                  data-action="learnora-attach-file"
                  title="Attach file"
                  aria-label="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>

          <textarea id="lr-input-text"
                    class="lr-textarea"
                    placeholder="Ask Learnora anything… (Shift+Enter for new line)"
                    rows="1"
                    aria-label="Message input"
                    aria-multiline="true"></textarea>

          <button id="lr-send-btn"
                  class="lr-send-btn"
                  data-action="learnora-send"
                  title="Send message"
                  aria-label="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <!-- Quota display -->
        <div id="lr-quota-display" aria-label="Daily message quota">
          <!-- Populated by learnora.events.js -->
        </div>

      </div><!-- /lr-input-area -->
    </div><!-- /lr-main -->
  </div><!-- /lr-root -->

  <!-- Fix 6: Floating conversation context menu (single instance, repositioned on open) -->
  <div id="lr-conv-menu" class="lr-conv-menu" role="menu" aria-label="Conversation options" style="display:none">
    <button class="lr-conv-menu__item" data-conv-action="rename" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Rename
    </button>
    <div class="lr-conv-menu__divider"></div>
    <button class="lr-conv-menu__item" data-conv-action="clear" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
      Clear messages
    </button>
    <button class="lr-conv-menu__item lr-conv-menu__item--danger" data-conv-action="delete" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
      Delete conversation
    </button>
  </div>

</section>
