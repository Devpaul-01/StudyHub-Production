<!-- ============================================================
     LEADERBOARD SECTION
     Drop this inside <body> alongside the other .section elements.
     The navigateTo('leaderboard') call in feed2.html already handles
     activating this section — no changes needed there.
     ============================================================ -->

<section id="leaderboard" class="section hidden" aria-label="Leaderboard">

  <!-- ── Section header ──────────────────────────────────────────────────── -->
  <div class="lb-section-header">
    <div class="lb-header-top">
      <div class="lb-title-block">
        <h2 class="lb-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M8 6l4-4 4 4M4 10h16M4 14h16M4 18h16"/>
          </svg>
          Leaderboard
        </h2>
        <span class="lb-subtitle">Who's climbing the ranks?</span>
      </div>
    </div>

    <!-- ── Stats banner (loaded async) ──────────────────────────────────── -->
    <div id="lb-stats-banner" class="lb-stats-banner-wrapper" aria-live="polite"></div>
  </div>

  <!-- ── View tabs: Global / Connections / Rising / Me ──────────────────── -->
  <div class="lb-view-tabs" role="tablist" aria-label="Leaderboard view">
    <button class="lb-view-tab lb-view-tab-active"
            data-action="lb-switch-view" data-view="global"
            role="tab" aria-selected="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Global
    </button>
    <button class="lb-view-tab"
            data-action="lb-switch-view" data-view="connections"
            role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Friends
    </button>
    <button class="lb-view-tab"
            data-action="lb-switch-view" data-view="rising"
            role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      Rising
    </button>
    <button class="lb-view-tab"
            data-action="lb-switch-view" data-view="me"
            role="tab" aria-selected="false">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      My Rank
    </button>
  </div>

  <!-- ── Filter bar: Period + Department ───────────────────────────────── -->
  <div class="lb-filters" id="lb-filters">

    <!-- Period tabs -->
    <div class="lb-period-tabs" id="lb-period-tabs" role="group" aria-label="Time period">
      <button class="lb-period-tab"
              data-action="lb-set-period" data-period="daily">Day</button>
      <button class="lb-period-tab lb-period-tab-active"
              data-action="lb-set-period" data-period="weekly">Week</button>
      <button class="lb-period-tab"
              data-action="lb-set-period" data-period="monthly">Month</button>
      <button class="lb-period-tab"
              data-action="lb-set-period" data-period="all_time">All time</button>
    </div>

    <!-- Department dropdown -->
    <div class="lb-dept-wrap">
      <select id="lb-dept-filter" class="lb-dept-select" aria-label="Filter by department">
        <option value="">All departments</option>
        <!-- Options populated dynamically OR hard-coded from your student departments list -->
        <option value="Computer Science">Computer Science</option>
        <option value="Engineering">Engineering</option>
        <option value="Mathematics">Mathematics</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
        <option value="Business">Business</option>
        <option value="Economics">Economics</option>
        <option value="Psychology">Psychology</option>
        <option value="Literature">Literature</option>
        <option value="History">History</option>
        <option value="Law">Law</option>
        <option value="Medicine">Medicine</option>
        <option value="Arts">Arts</option>
        <option value="Other">Other</option>
      </select>
    </div>
  </div>

  <!-- ── My rank summary strip (shown on global/connections/rising views) ── -->
  <div id="lb-my-strip-wrapper" class="lb-my-strip-wrapper" aria-live="polite"></div>

  <!-- ── Score breakdown panel (slides in from bottom) ────────────────── -->
  <div id="lb-breakdown-wrapper" class="lb-breakdown-wrapper lb-breakdown-hidden"
       aria-live="polite" aria-label="Score breakdown panel"></div>

  <!-- ── Main leaderboard list ─────────────────────────────────────────── -->
  <div id="lb-list" class="lb-main-list" aria-live="polite" aria-label="Leaderboard list"></div>

</section>
