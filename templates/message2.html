<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleek Chat Interface</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #131820 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.demo-buttons {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  z-index: 999;
}

.demo-btn {
  background: linear-gradient(135deg, #00d9ff 0%, #1dd3e0 100%);
  color: #0a0e1a;
  border: none;
  padding: 12px 24px;
  border-radius: 25px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
}

.demo-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 217, 255, 0.5);
}

/* Modal Overlay */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(10px);
  animation: fadeIn 0.3s ease;
}

.modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Modal Content */
.modal-content {
  background: linear-gradient(135deg, #0f1419 0%, #131820 100%);
  border-radius: 20px;
  width: 90%;
  max-width: 450px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(29, 211, 224, 0.1);
  animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Header Styles */
.modal-header {
  padding: 20px;
  background: linear-gradient(135deg, #131820 0%, #0f1419 100%);
  border-bottom: 1px solid rgba(29, 211, 224, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  color: #ffffff;
  font-size: 22px;
  font-weight: 600;
  background: linear-gradient(135deg, #00d9ff 0%, #1dd3e0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.close-btn, .back-btn, .more-btn {
  cursor: pointer;
  background: rgba(29, 211, 224, 0.1);
  border: 1px solid rgba(29, 211, 224, 0.2);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d9ff;
  font-size: 20px;
  transition: all 0.3s ease;
}

.close-btn:hover, .back-btn:hover, .more-btn:hover {
  background: rgba(29, 211, 224, 0.2);
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
}

/* Conversation List */
.modal-body {
  padding: 10px;
  overflow-y: auto;
  flex-grow: 1;
}

.modal-body::-webkit-scrollbar {
  width: 6px;
}

.modal-body::-webkit-scrollbar-track {
  background: rgba(29, 211, 224, 0.05);
}

.modal-body::-webkit-scrollbar-thumb {
  background: rgba(29, 211, 224, 0.3);
  border-radius: 3px;
}

#conversationList {
  list-style: none;
}

#conversationList li {
  display: flex;
  align-items: center;
  padding: 15px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
}

#conversationList li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(0, 217, 255, 0.05) 0%, rgba(29, 211, 224, 0.05) 100%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

#conversationList li:hover::before {
  opacity: 1;
}

#conversationList li:hover {
  transform: translateX(5px);
  border-left: 3px solid #00d9ff;
}

.avatar, .chat-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin-right: 15px;
  border: 2px solid rgba(29, 211, 224, 0.3);
  object-fit: cover;
  transition: all 0.3s ease;
}

#conversationList li:hover .avatar {
  border-color: #00d9ff;
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
}

.conversation-info {
  flex-grow: 1;
  min-width: 0;
}

.conversation-info .name {
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 4px;
  font-size: 16px;
}

.conversation-info .last-message {
  font-size: 14px;
  color: #8b92a8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.timestamp {
  font-size: 12px;
  color: #7a8199;
  white-space: nowrap;
}

.unread-badge {
  background: linear-gradient(135deg, #00d9ff 0%, #1dd3e0 100%);
  color: #0a0e1a;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-left: 8px;
}

/* Chat Modal */
.chat-header {
  padding: 15px 20px;
  background: linear-gradient(135deg, #131820 0%, #0f1419 100%);
  border-bottom: 1px solid rgba(29, 211, 224, 0.1);
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header-info {
  flex-grow: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-user-details {
  flex-grow: 1;
}

#chatUserName {
  color: #ffffff;
  font-weight: 600;
  font-size: 16px;
  display: block;
  margin-bottom: 2px;
}

.user-status {
  font-size: 12px;
  color: #8b92a8;
}

.status-online {
  color: #00d9ff;
}

/* Chat Body */
.chat-body {
  flex-grow: 1;
  padding: 20px;
  overflow-y: auto;
  background: #0a0e1a;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-body::-webkit-scrollbar {
  width: 6px;
}

.chat-body::-webkit-scrollbar-track {
  background: rgba(29, 211, 224, 0.05);
}

.chat-body::-webkit-scrollbar-thumb {
  background: rgba(29, 211, 224, 0.3);
  border-radius: 3px;
}

.message {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 18px;
  animation: messageSlide 0.3s ease;
  position: relative;
}

@keyframes messageSlide {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message.received {
  background: linear-gradient(135deg, #1a1f2e 0%, #1f2433 100%);
  border: 1px solid rgba(29, 211, 224, 0.1);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  color: #e5e7eb;
}

.message.sent {
  background: linear-gradient(135deg, #00d9ff 0%, #1dd3e0 100%);
  color: #0a0e1a;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 15px rgba(0, 217, 255, 0.2);
}

.message p {
  margin: 0 0 4px 0;
  font-size: 15px;
  line-height: 1.4;
}

.message .time {
  font-size: 11px;
  opacity: 0.7;
}

/* Chat Footer */
.chat-footer {
  display: flex;
  align-items: center;
  padding: 15px 20px;
  gap: 10px;
  background: linear-gradient(135deg, #0f1419 0%, #131820 100%);
  border-top: 1px solid rgba(29, 211, 224, 0.1);
}

.chat-footer button {
  background: rgba(29, 211, 224, 0.1);
  border: 1px solid rgba(29, 211, 224, 0.2);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #00d9ff;
  font-size: 20px;
  transition: all 0.3s ease;
}

.chat-footer button:hover {
  background: rgba(29, 211, 224, 0.2);
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
}

.chat-footer input[type="text"] {
  flex-grow: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: 1px solid rgba(29, 211, 224, 0.2);
  background: rgba(19, 24, 32, 0.8);
  color: #ffffff;
  font-size: 15px;
  transition: all 0.3s ease;
}

.chat-footer input[type="text"]:focus {
  outline: none;
  border-color: #00d9ff;
  box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
  background: rgba(19, 24, 32, 1);
}

.chat-footer input[type="text"]::placeholder {
  color: #7a8199;
}

.send-btn {
  background: linear-gradient(135deg, #00d9ff 0%, #1dd3e0 100%) !important;
  color: #0a0e1a !important;
}

.send-btn:hover {
  box-shadow: 0 0 20px rgba(0, 217, 255, 0.5) !important;
}

/* Typing Indicator */
.typing-indicator {
  display: none;
  align-self: flex-start;
  padding: 12px 16px;
  background: linear-gradient(135deg, #1a1f2e 0%, #1f2433 100%);
  border: 1px solid rgba(29, 211, 224, 0.1);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
}

.typing-indicator.active {
  display: flex;
  gap: 4px;
}

.typing-dot {
  width: 8px;
  height: 8px;
  background: #00d9ff;
  border-radius: 50%;
  animation: typingBounce 1.4s infinite;
}

.typing-dot:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typingBounce {
  0%, 60%, 100% {
    transform: translateY(0);
  }
  30% {
    transform: translateY(-10px);
  }
}

/* Responsive */
@media (max-width: 600px) {
  .modal-content {
    width: 100%;
    max-width: 100%;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
  }
}
</style>
</head>
<body>


<!-- Conversation List Modal -->
<div id="conversation-list-modal" class="conversation-list-modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Messages</h2>
      <span class='unread-count' id='unread-chat-messsge-count'></span>
      <span class="close-btn"  data-action='close-modal' data-modal-id='conversation-list-modal'>&times;</span>
    </div>
    <div class="modal-body">
      <ul id="conversation-list-container">
      </ul>
    </div>
  </div>
</div>

<!-- Chat Modal -->
<div id="conversation-messages-modal" class="modal">
  <div class="modal-content">
      
  </div>
</div>
</div>


</body>
</html>
