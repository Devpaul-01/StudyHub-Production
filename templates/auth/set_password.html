<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/set_password.css') }}">
</head>
<body>
    <div class="container">
        <h2>Set New Password</h2>
        <form id="resetForm">
            <div class="input-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required>
                <span id="passwordError"></span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                <span id="confirmError"></span>
            </div>

            <button type="submit">Set Password</button>
        </form>
    </div>
</body>
<script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get("email");
    const password = document.getElementById("password");
    const passwordSpan = document.getElementById("passwordError");
    const confirmPassword = document.getElementById("confirmPassword");
    const confirmError = document.getElementById("confirmError");
    const resetForm = document.getElementById("resetForm");
    
    // ✅ FIXED: Validate email exists
    if (!email) {
      showToast("Invalid reset link. Please request a new password reset.", "error");
      setTimeout(() => {
        window.location.href = "/student/reset-password";
      }, 2000);
      return;
    }
    
    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      await validatePassword(e);
    });
    
    // ✅ FIXED: Send JSON instead of FormData, match backend field names
    async function setPassword(e) {
      if(!email){
        showToast("An unexpected error was encountered. Please try again later.", "error");
        return;
      }
      
      const data = {
        email: email,
        password: password.value,
        confirm_password: confirmPassword.value  // ✅ Match backend field name
      };
      
      try{
        const response = await api.post("/set-password", data);  // ✅ Added /student/ prefix
        
        if(response.status == "success"){
          showToast(response.message, "success");
          setTimeout(() => {
            window.location.href = "/student/login";
          }, 3000);
        }
        else{
          showToast(response.message, "error");
        }
      }
      catch(error){
        showToast(error.message || "Failed to set password. Please try again.", "error");
      }
    }
    
    // ✅ FIXED: Clear errors before validation, remove redundant hasError check
    async function validatePassword(e) {
      // Clear previous errors
      passwordSpan.classList.remove("invalid", "valid");
      confirmError.classList.remove("invalid", "valid");
      passwordSpan.textContent = "";
      confirmError.textContent = "";
      
      let hasError = false;
      const passwordValue = password.value;
      const confirmValue = confirmPassword.value;
      
      if (!passwordValue || passwordValue.length < 6){
        passwordSpan.classList.add("invalid");
        passwordSpan.textContent = "Password must be at least 6 characters";
        hasError = true;
      }
      
      if(!confirmValue || confirmValue != passwordValue){
        confirmError.classList.add("invalid");
        confirmError.textContent = "Passwords must match";
        hasError = true;
      }
      
      // ✅ FIXED: Only proceed if no errors
      if(!hasError){
        await setPassword(e);
      }
    }
    
    password.addEventListener("input", (e) => {
      passwordSpan.classList.remove("invalid", "valid");
      if(e.target.value.length < 6){
        passwordSpan.classList.add("invalid");
        passwordSpan.textContent = "Password must be at least 6 characters";
      } else {
        passwordSpan.classList.add("valid");
        passwordSpan.textContent = "Password valid";
      }
    });
    
    confirmPassword.addEventListener("input", (e) => {
      confirmError.classList.remove("invalid", "valid");
      if(e.target.value != password.value){
        confirmError.classList.add("invalid");
        confirmError.textContent = "Both password input fields must match";
      } else {
        confirmError.classList.add("valid");
        confirmError.textContent = "Valid";
      }
    });
  });
</script>
</html>
