<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyHub{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ========================================
         TOP NAVIGATION BAR (Fixed on all pages)
    ======================================== -->
    <nav class="navbar" id="navbar">
        <div class="navbar-container">
            <!-- Logo -->
            <div class="navbar-logo">
                <a href="/student/profile/homepage">
                    <span class="logo-icon">🎓</span>
                    <span class="logo-text">StudyHub</span>
                </a>
            </div>
            
            <!-- Global Search -->
            <div class="navbar-search">
                <input 
                    type="text" 
                    id="global-search" 
                    placeholder="Search posts, users, threads..." 
                    class="search-input"
                >
            </div>
            
            <!-- Right Actions -->
            <div class="navbar-actions">
                <!-- Notifications -->
                <button class="navbar-icon-btn" onclick="window.location.href='{{ url_for('student.student_profile.notification_page') }}'">
                    <span class="icon">🔔</span>
                    <span class="notification-badge" id="notif-count">0</span>
                </button>
                
                <!-- AI Assistant -->
                <a href="{{ url_for('learnora.ai_chat_page') }}" class="navbar-icon-btn">
                    <span class="icon">⚡</span>
                </a>
                
                <!-- Messages (DMs + Threads + Buddies) -->
                <button class="navbar-icon-btn" onclick="openMessagesModal()">
                    <span class="icon">💬</span>
                    <span class="notification-badge" id="msg-count">0</span>
                </button>
                
                <!-- Profile Dropdown -->
                <div class="navbar-profile-dropdown">
                    <button class="profile-btn" id="profile-dropdown-btn">
                        <img 
                            src="/static/assets/default-avatar.png" 
                            alt="Profile" 
                            class="profile-avatar"
                            id="user-avatar"
                        >
                        <span class="profile-name" id="user-name">Loading...</span>
                    </button>
                    
                    <div class="dropdown-menu hidden" id="profile-dropdown-menu">
                        <a href="{{ url_for('student.student_profile.get_own_profile') }}" class="dropdown-item">
                            👤 My Profile
                        </a>
                        <a href="/student/posts/bookmarked" class="dropdown-item">
                            🔖 Bookmarks
                        </a>
                        <a href="/student/leaderboard" class="dropdown-item">
                            🏆 Leaderboard
                        </a>
                        <hr class="dropdown-divider">
                        <a href="#" onclick="logout(); return false;" class="dropdown-item text-danger">
                            🚪 Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- ========================================
         MAIN CONTENT AREA (Changes per page)
    ======================================== -->
    <div class="page-wrapper">
        {% block content %}
        <!-- Individual pages inject content here -->
        {% endblock %}
    </div>

    <!-- ========================================
         MOBILE BOTTOM NAVIGATION (Always visible on mobile)
    ======================================== -->
    <nav class="bottom-nav mobile-only">
        <a href="/student/profile/homepage" class="bottom-nav-item" id="nav-home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="/student/search" class="bottom-nav-item" id="nav-search">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Search</span>
        </a>
        <button class="bottom-nav-item" onclick="openCreatePostModal()">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Create</span>
        </button>
        <button class="bottom-nav-item" onclick="openMessagesModal()">
            <span class="nav-icon">💬</span>
            <span class="nav-label">Messages</span>
            <span class="nav-badge" id="messages-badge">0</span>
        </button>
        <a href="/student/profile/me" class="bottom-nav-item" id="nav-profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </a>
    </nav>
    
    <!-- ========================================
         CORE SCRIPTS (Loaded on every page)
    ======================================== -->
    <script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/base.js') }}"></script>
    
    <script>
        // Initialize auth and UI on every page
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Initializing app...');
            
            try {
                const user = await api.verifyAuth();
                
                if (user) {
                    console.log('✅ User authenticated:', user.username);
                    
                    // Update navbar with user info
                    document.getElementById('user-name').textContent = '@' + user.username;
                    
                    if (user.avatar) {
                        document.getElementById('user-avatar').src = user.avatar;
                    }
                    
                    // Load notification counts
                    loadNotificationCounts();
                    
                } else {
                    console.log('❌ User not authenticated');
                    
                    // Redirect if on protected page
                    const protectedPages = ['/student/profile/', '/student/post/', '/student/thread/'];
                    const currentPath = window.location.pathname;
                    
                    if (protectedPages.some(page => currentPath.startsWith(page))) {
                        window.location.href = '/student/login';
                    }
                }
            } catch (error) {
                console.error('❌ Auth error:', error);
            }
            
            setupBaseUIListeners();
        });
        
        // Setup base UI listeners (dropdown, etc.)
        function setupBaseUIListeners() {
            const dropdownBtn = document.getElementById('profile-dropdown-btn');
            const dropdownMenu = document.getElementById('profile-dropdown-menu');
            
            if (dropdownBtn && dropdownMenu) {
                dropdownBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('hidden');
                });
                
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.navbar-profile-dropdown')) {
                        dropdownMenu.classList.add('hidden');
                    }
                });
            }
            
            // Highlight active nav
            highlightActiveNav();
        }
        
        function highlightActiveNav() {
            const currentPath = window.location.pathname;
            
            // Bottom nav highlighting
            document.querySelectorAll('.bottom-nav-item').forEach(item => {
                const href = item.getAttribute('href');
                if (href && currentPath.startsWith(href)) {
                    item.classList.add('active');
                }
            });
        }
        
        async function loadNotificationCounts() {
            try {
                const response = await api.get('/notifications/unread-count');
                if (response.data?.count) {
                    document.getElementById('notif-count').textContent = response.data.count;
                }
            } catch (error) {
                console.error('Failed to load notification count:', error);
            }
        }
        
        function openMessagesModal() {
            window.location.href = '/student/messages';
        }
        
        function openCreatePostModal() {
            window.location.href = '/student/posts/create';
        }
        
        function logout() {
            localStorage.removeItem('studyhub_token');
            window.location.href = '/student/login';
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
