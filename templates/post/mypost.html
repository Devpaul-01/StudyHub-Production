<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Posts - StudyHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .create-btn {
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-top: 0.5rem;
            font-weight: 600;
        }

        .filters {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            animation: slideUp 0.5s ease 0.1s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: var(--gray-100);
            border: 2px solid transparent;
            border-radius: 12px;
            font-weight: 600;
            color: var(--gray-700);
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: var(--gray-200);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: var(--primary);
        }

        .posts-grid {
            display: grid;
            gap: 1.5rem;
        }

        .post-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease both;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .post-card:hover::before {
            transform: scaleX(1);
        }

        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .post-type-badge {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .post-type-badge.question {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .post-type-badge.discussion {
            background: #FCE7F3;
            color: #9F1239;
        }

        .post-type-badge.resource {
            background: #D1FAE5;
            color: #065F46;
        }

        .post-type-badge.problem {
            background: #FEF3C7;
            color: #92400E;
        }

        .post-status {
            display: flex;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-badge.solved {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-badge.pinned {
            background: #FEF3C7;
            color: #92400E;
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .post-excerpt {
            color: var(--gray-500);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            padding: 0.4rem 0.75rem;
            background: var(--gray-100);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--gray-700);
            font-weight: 500;
        }

        .post-stats {
            display: flex;
            gap: 2rem;
            padding-top: 1rem;
            border-top: 2px solid var(--gray-100);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-500);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .stat-item-icon {
            font-size: 1.25rem;
        }

        .post-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .action-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--gray-200);
            background: white;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .action-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #FEE2E2;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .empty-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.75rem;
        }

        .empty-text {
            color: var(--gray-500);
            margin-bottom: 2rem;
        }

        .loading {
            text-align: center;
            padding: 4rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .page-title { font-size: 2rem; }
            .post-title { font-size: 1.25rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .post-stats { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <h1 class="page-title">
                    <span>📝</span>
                    My Posts
                </h1>
                <button class="create-btn" onclick="window.location.href='/student/posts/create'">
                    <span>✨</span>
                    Create New Post
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-posts">0</div>
                    <div class="stat-label">Total Posts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-views">0</div>
                    <div class="stat-label">Total Views</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-likes">0</div>
                    <div class="stat-label">Total Likes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="solved-posts">0</div>
                    <div class="stat-label">Solved</div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Posts</button>
            <button class="filter-btn" data-filter="question">Questions</button>
            <button class="filter-btn" data-filter="discussion">Discussions</button>
            <button class="filter-btn" data-filter="resource">Resources</button>
            <button class="filter-btn" data-filter="problem">Problems</button>
            <button class="filter-btn" data-filter="solved">✅ Solved</button>
        </div>

        <!-- Posts Grid -->
        <div id="posts-container" class="posts-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p style="color: white; margin-top: 1rem; font-weight: 600;">Loading your posts...</p>
            </div>
        </div>
    </div>

    <script src="/static/js/core/api.js"></script>
    <script src="/static/js/core/utils.js"></script>
    <script>
        let allPosts = [];
        let currentFilter = 'all';

        async function init() {
            await loadPosts();
            setupFilters();
        }

        async function loadPosts() {
            try {
                const res = await api.get('/posts/my-posts?per_page=100');
                allPosts = res.data.posts;
                
                updateStats();
                renderPosts();
            } catch (error) {
                console.error('Load posts error:', error);
                showError();
            }
        }

        function updateStats() {
            const totalViews = allPosts.reduce((sum, p) => sum + p.views, 0);
            const totalLikes = allPosts.reduce((sum, p) => sum + p.likes_count, 0);
            const solvedCount = allPosts.filter(p => p.is_solved).length;

            document.getElementById('total-posts').textContent = allPosts.length;
            document.getElementById('total-views').textContent = totalViews;
            document.getElementById('total-likes').textContent = totalLikes;
            document.getElementById('solved-posts').textContent = solvedCount;
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            let posts = filterPosts();

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">No posts yet</div>
                        <div class="empty-text">Create your first post to start sharing knowledge!</div>
                        <button class="create-btn" onclick="window.location.href='/student/posts/create'">
                            <span>✨</span>
                            Create Post
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map((post, index) => `
                <div class="post-card" style="animation-delay: ${index * 0.1}s">
                    <div class="post-header">
                        <span class="post-type-badge ${post.post_type}">${post.post_type}</span>
                        <div class="post-status">
                            ${post.is_solved ? '<span class="status-badge solved">✓ Solved</span>' : ''}
                            ${post.is_pinned ? '<span class="status-badge pinned">📌 Pinned</span>' : ''}
                        </div>
                    </div>

                    <h3 class="post-title">${post.title}</h3>
                    
                    ${post.excerpt ? `<p class="post-excerpt">${post.excerpt}</p>` : ''}

                    ${post.tags && post.tags.length > 0 ? `
                        <div class="post-tags">
                            ${post.tags.slice(0, 3).map(tag => `<span class="tag">#${tag}</span>`).join('')}
                        </div>
                    ` : ''}

                    <div class="post-stats">
                        <div class="stat-item">
                            <span class="stat-item-icon">👁️</span>
                            <span>${post.views}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-item-icon">👍</span>
                            <span>${post.likes_count}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-item-icon">💬</span>
                            <span>${post.comments_count}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-item-icon">📅</span>
                            <span>${formatDate(post.posted_at)}</span>
                        </div>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn" onclick="viewPost(${post.id})">
                            👁️ View
                        </button>
                        <button class="action-btn" onclick="editPost(${post.id})">
                            ✏️ Edit
                        </button>
                        <button class="action-btn" onclick="viewAnalytics(${post.id})">
                            📊 Analytics
                        </button>
                        <button class="action-btn danger" onclick="deletePost(${post.id})">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterPosts() {
            if (currentFilter === 'all') return allPosts;
            if (currentFilter === 'solved') return allPosts.filter(p => p.is_solved);
            return allPosts.filter(p => p.post_type === currentFilter);
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderPosts();
                });
            });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function viewPost(id) {
            window.location.href = `/student/posts/${id}`;
        }

        function editPost(id) {
            window.location.href = `/student/posts/${id}/edit`;
        }

        function viewAnalytics(id) {
            window.location.href = `/student/analytics/post/${id}`;
        }

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            try {
                await api.delete(`/posts/${id}`);
                allPosts = allPosts.filter(p => p.id !== id);
                updateStats();
                renderPosts();
                showToast('Post deleted successfully', 'success');
            } catch (error) {
                showToast('Failed to delete post', 'error');
            }
        }

        function showError() {
            document.getElementById('posts-container').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-title">Failed to load posts</div>
                    <div class="empty-text">Please refresh the page</div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
