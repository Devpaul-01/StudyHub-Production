<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Connections - StudyHub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/connection/connection.css') }}">
  <!-- Optional: Add Google Fonts for better typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Main Container -->
  <div class="container">
    <!-- Header Section -->
    <div class="header">
      <div class="header-top">
        <h1 class="page-title">
          <span>🔔</span>
          Connections
        </h1>
      </div>
    </div>

    <!-- Search Section -->
    <div class="search-div" id="connection-search-div">
      <input 
        class="search-input" 
        placeholder="Search users with super filters..." 
        id="connection-search-input" 
        type="text"
        autocomplete="off"
      >
      
      <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
        <button class="filter-btn" id="filter-btn-all">
          Filters 🎛️
        </button>
        <button class="sort-btn" id="sort-btn">
          Sort ▼
        </button>
      </div>

      <!-- Sort Options -->
      <div class="select-filter hidden" id="select-filter">
        <select class="user-sort" id="user-sort">
          <option class="select-option" value="relevance">Relevance</option>
          <option class="select-option" value="reputation">Reputation</option>
          <option class="select-option" value="name">Name</option>
          <option class="select-option" value="recent">Recent</option>
        </select>
      </div>

      <!-- Filter Details -->
      <div class="user-select-details hidden" id="user-select-details">
        <label style="color: var(--text-secondary); font-weight: 500; margin-bottom: 0.5rem; display: block;">
          Class Level
        </label>
        <select class="filter-select" id="filter-select-class-level">
          <option value="">Select Class Level</option>
        </select>

        <label style="color: var(--text-secondary); font-weight: 500; margin-bottom: 0.5rem; margin-top: 1rem; display: block;">
          Department
        </label>
        <select class="filter-select" id="filter-select-department">
          <option value="">Select Department</option>
        </select>

        <label style="color: var(--text-secondary); font-weight: 500; margin-bottom: 0.5rem; margin-top: 1rem; display: block;">
          Skills
        </label>
        <ul class="filter-list" id="skills-list"></ul>
        
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <input 
            class="filter-input" 
            id="filter-input-skills" 
            type="text" 
            placeholder="Enter a skill (e.g., Python, React)"
            autocomplete="off"
          >
          <button class="filter-btn-small" id="filter-btn-skill-input">Add</button>
        </div>

        <label style="color: var(--text-secondary); font-weight: 500; margin-bottom: 0.5rem; margin-top: 1rem; display: block;">
          Minimum Reputation: <span id="rep-value">0</span>
        </label>
        <input 
          type="range" 
          min="0" 
          max="1500" 
          value="0"
          class="filter-input" 
          id="filter-input-reputation"
          oninput="document.getElementById('rep-value').textContent = this.value"
        >

        <button class="filter-btn" id="filter-btn-cancel" style="margin-top: 1rem; background: var(--error);">
          Clear All Filters
        </button>
      </div>

      <!-- Search Results Container -->
      <div class="search-result"></div>
    </div>

    <!-- Tabs Container -->
    <div class="tabs-container">
      <div class="tabs">
        <button class="tab active" onclick="switchType('pendings')" data-tab="pendings">
          <span>📬</span>
          Pending Requests
          <span class="tab-connection" id="connection-pendings">0</span>
        </button>
        <button class="tab" onclick="switchType('connections')" data-tab="connections">
          <span>🤝</span>
          Connections
          <span class="tab-connection" id="connection-connections">0</span>
        </button>
        <button class="tab" onclick="switchType('mutuals')" data-tab="mutuals">
          <span>👥</span>
          Mutuals
        </button>
        <button class="tab" onclick="switchType('sugguestions')" data-tab="sugguestions">
          <span>✨</span>
          Suggestions
        </button>
      </div>

      <!-- Pending Connections Filter -->
      <div class="pending-connections hidden" id="pending-connection-filter">
        <button class="connected-tab" onclick="switchType('received')" data-type="received">
          <span>📥</span>
          Received
        </button>
        <button class="connected-tab" onclick="switchType('sents')" data-type="sent">
          <span>📤</span>
          Sent
        </button>
      </div>

      <!-- Connected Connections Filter -->
      <div class="connected-connections hidden" id="connected-connection-filter">
        <button class="connected-tab" data-type="thread" id="connected-tab-thread">
          <span>🧵</span>
          Thread Members
        </button>
        <button class="connected-tab" data-type="department" id="connected-tab-department">
          <span>🏢</span>
          Department
        </button>
      </div>
    </div>

    <!-- Connections List Container -->
    <div id="connections-container" class="connections-list">
      <div class="loading-state">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600;">Loading connections...</p>
      </div>
    </div>
  </div>

  <!-- Image Modal -->
  <div id="image-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <img id="modal-image" src="" alt="Profile Preview">
    </div>
  </div>

  <!-- Settings Button -->
  <button class="settings-btn" id="connection-settings-btn" aria-label="Settings">
    ⚙️
  </button>

  <!-- Settings Modal -->
  <div class="settings-modal hidden" id="connection-settings-modal">
    <h3 style="color: var(--text-primary); font-size: 1.25rem; margin-bottom: 1rem; font-weight: 700;">
      Connection Settings
    </h3>
    
    <label style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; cursor: pointer; color: var(--text-secondary); font-weight: 500;">
      <input 
        type="checkbox" 
        id="sound-toggle" 
        class="connection-settings-toggle" 
        data-type="enable-notification"
      >
      <span>Enable Sound Notifications</span>
    </label>

    <button class="connection-blocked-btn" id="blocked-users-btn">
      <span style="display: flex; align-items: center; gap: 0.5rem;">
        <span>🚫</span>
        <span>Blocked Users</span>
      </span>
      <span class="blocked-count" id="connection-blocked-count">0</span>
    </button>

    <!-- Blocked Users Container -->
    <div class="blocked-container hidden" id="blocked-users">
      <div class="loading-state">
        <div class="spinner"></div>
        <p style="margin-top: 0.5rem;">Loading blocked users...</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="{{url_for('static', filename='js/core/api.js')}}"></script>
  <script src="{{url_for('static', filename='js/core/utils.js')}}"></script>
  <script src="{{url_for('static', filename='js/connection/connection.js')}}"></script>
</body>
</html>
