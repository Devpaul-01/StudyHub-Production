<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyHub - Leaderboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/leaderboard/leaderboard.css') }}">
</head>
<body>
  <!-- Main Container -->
  <div class="leaderboard-page">
    
    <!-- User Rank Header -->
    <section class="user-rank-section" id="user-rank-section">
      <div class="skeleton-loader" id="rank-skeleton">
        <div class="skeleton skeleton-text w-60"></div>
        <div class="skeleton skeleton-text w-40"></div>
      </div>
    </section>

    <!-- Recent Changes Modal -->
    <div class="modal-overlay hidden" id="changes-modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <h2>📊 Recent Reputation Changes</h2>
          <button class="modal-close-btn" id="close-changes-modal" aria-label="Close">×</button>
        </div>
        <div class="modal-body" id="changes-modal-body">
          <!-- Changes loaded here -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="modal-cancel-btn">Close</button>
          <button class="btn btn-primary" id="modal-export-btn">
            <span>📥</span> Export Data
          </button>
        </div>
      </div>
    </div>

    <!-- Badge Detail Modal -->
    <div class="modal-overlay hidden" id="badge-modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <h2>🏆 Badge Collection</h2>
          <button class="modal-close-btn" id="close-badge-modal" aria-label="Close">×</button>
        </div>
        <div class="modal-body" id="badge-modal-body">
          <!-- Badges loaded here -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="badge-cancel-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Navigation Tabs -->
    <nav class="leaderboard-nav">
      <div class="tabs-container">
        <button class="tab active" data-tab="global" data-action="switchTab">
          <span class="tab-icon">🌍</span>
          <span class="tab-label">Global Leaderboard</span>
        </button>
        <button class="tab" data-tab="department" data-action="switchTab">
          <span class="tab-icon">🎓</span>
          <span class="tab-label">Department</span>
        </button>
        <button class="tab" data-tab="stats" data-action="switchTab">
          <span class="tab-icon">📊</span>
          <span class="tab-label">Stats</span>
        </button>
        <button class="tab" data-tab="achievements" data-action="switchTab">
          <span class="tab-icon">🏆</span>
          <span class="tab-label">Top Badge Earners</span>
        </button>
      </div>

      <!-- Department Selector (shown when department tab is active) -->
      <div class="department-selector hidden" id="department-selector">
        <label for="department-select">Select Department:</label>
        <select id="department-select" class="department-dropdown">
          <option value="">Loading...</option>
        </select>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="leaderboard-main" id="leaderboard-main">
      <div class="skeleton-grid" id="content-skeleton">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </main>

    <!-- Scroll to Top Button -->
    <button class="scroll-top-btn hidden" id="scroll-top-btn" aria-label="Scroll to top">
      ↑
    </button>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- Scripts -->
  <script src="/static/js/core/api.js"></script>
  <script src="/static/js/leaderboard/leaderboard.js"></script>
</body>
</html>
