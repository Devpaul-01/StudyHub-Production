<div class="badges-container">
  <!-- User's Badge Summary -->
  <div class="user-badges-summary" id="user-badges-summary">
    <!-- Dynamically loaded -->
  </div>

  <!-- Badge Categories Tabs -->
  <div class="tabs-container">
    <div class="tabs" id="badge-tabs">
      <button class="tab active" onclick="switchBadgeType(event, 'all')">
        <span>🏆</span> All Badges
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'earned')">
        <span>✨</span> My Badges
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'engagement')">
        <span>💬</span> Engagement
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'quality')">
        <span>💡</span> Quality
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'consistency')">
        <span>🔥</span> Consistency
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'social')">
        <span>🤝</span> Social
      </button>
      <button class="tab" onclick="switchBadgeType(event, 'milestone')">
        <span>🌟</span> Milestones
      </button>
    </div>
  </div>

  <!-- Badge Progress Section (for unearned badges) -->
  <div class="badge-progress-section hidden" id="badge-progress">
    <h2>🎯 Almost There!</h2>
    <div id="badge-progress-list"></div>
  </div>

  <!-- Main Badge Display Container -->
  <div class="badges-display-container" id="badges-container">
    <!-- Badges loaded here -->
  </div>

  <!-- Badge Detail Modal -->
  <div class="badge-detail-modal hidden" id="badge-detail-modal">
    <button class="close-btn" onclick="closeBadgeModal()">×</button>
    <div id="badge-detail-content"></div>
  </div>
</div>
